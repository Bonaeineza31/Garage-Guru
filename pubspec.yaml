name: garage_guru
description: GarageGuru - Find and book trusted garage services near you.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  provider: ^6.1.1
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  intl: ^0.19.0
  image_picker: ^1.0.7
  table_calendar: ^3.0.9
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  url_launcher: ^6.2.4
  smooth_page_indicator: ^1.1.0
  font_awesome_flutter: ^10.7.0
  google_fonts: ^6.1.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  equatable: ^2.0.8
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
